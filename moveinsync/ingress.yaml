apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moveinsync-ingress
  labels:
    app: moveinsync
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - quntamvector.in
    secretName: moveinsync-tls
  rules:
  - host: quntamvector.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: moveinsync-service
            port:
              number: 80
